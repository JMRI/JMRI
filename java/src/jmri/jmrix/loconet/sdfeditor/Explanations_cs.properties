# Explanations_cs.properties
# Explanations of individual instructions used by the
# SdfMacroEditor
# Translation: Petr Sidlo

BRANCH_TO = Nam\u00edsto pokra\u010dov\u00e1n\u00ed k dal\u0161\u00ed instrukci \
            odbo\u010dte a pokra\u010duje v nazba\u010den\u00e9m m\u00edst\u011b.

CHANNEL_START =  Ozna\u010duje za\u010d\u00e1tek instrukc\u00ed pro konkr\u00e9tn\u00ed kan\u00e1l \
            zpracov\u00e1n\u00ed zvuku. \u010c\u00edsla kan\u00e1l\u016f odpov\u00eddaj\u00ed konkr\u00e9tn\u00edm \
            \u010d\u00e1stem hardwaru dekod\u00e9ru a nelze je zm\u011bnit.

DELAY_SOUND =  Zpo\u017ed\u011bn\u00ed zvukov\u00e9ho v\u00fdstupu do ud\u00e1losti nebo na ur\u010dit\u00fd \u010das.

END_SOUND =  Konec definice zvukov\u00e9 sekvence.

GENERATE_TRIGGER = Vytvo\u0159en\u00ed spou\u0161t\u011bc\u00ed ud\u00e1losti.

INITIATE_SOUND = <html><BODY>Spust\u00ed definici specifick\u00e9ho zvuku v kan\u00e1lu. \
                 <p>Prvn\u00ed argument nastavuje spou\u0161t\u011bc\u00ed podm\u00ednku, za kter\u00e9 tato sekvence za\u010d\u00edn\u00e1.\
                 <p>Druh\u00fd obsahuje a\u017e \u010dty\u0159i modifik\u00e1tory, kter\u00e9 ovliv\u0148uj\u00ed interpretaci spou\u0161t\u011bc\u00ed podm\u00ednky.</BODY></html>
                
LOAD_MODIFIER = Konfiguruje modifik\u00e1tory, kter\u00e9 \u0159\u00edd\u00ed aspekty generov\u00e1n\u00ed zvuku.

MASK_COMPARE = Zkontroluje informace o stavu a rozhodne, zda p\u0159esko\u010dit dal\u0161\u00ed instrukci.

PLAY =  <html><body>Spustit streamov\u00e1n\u00ed fragmentu zvukov\u00e9ho souboru. \
        <p>Prvn\u00ed argument je \u010d\u00edslo \u00fachytu fragmentu, kter\u00fd se m\u00e1 \
        p\u0159ehr\u00e1t. Toto \u010d\u00edslo je p\u0159i\u0159azeno konkr\u00e9tn\u00edmu zvukov\u00e9mu fragmentu (souboru WAV) \
        v souboru zvukov\u00e9ho projektu. \
        <p>Druh\u00fd argument ur\u010duje, jak dlouho se \
        fragment bude smy\u010dkovat.</p>\
        <p>T\u0159et\u00ed argument umo\u017e\u0148uje invertovat podm\u00ednku smy\u010dky \
        a/nebo u\u010dinit podm\u00ednku glob\u00e1ln\u00ed. \
        </body></html>

SDL_VERSION = Zdokumentujte verzi pou\u017eit\u00e9ho form\u00e1tu SDF. \
                Aktu\u00e1ln\u011b je definov\u00e1na pouze verze 1, \
                tak\u017ee v t\u00e9to instrukci nen\u00ed co upravovat.

SKEME_START = Za\u010d\u00e1tek definice konkr\u00e9tn\u00edho zvukov\u00e9ho sch\u00e9matu. \
                \u010c\u00edsla sch\u00e9mat za\u010d\u00ednaj\u00ed 0 a po\u010d\u00edtaj\u00ed se nahoru. Sch\u00e9ma 31 \
                ozna\u010duje konec souboru s definic\u00ed zvuku.

SKIP_ON_TRIGGER =  Pokud je spln\u011bna konkr\u00e9tn\u00ed spou\u0161t\u011bc\u00ed podm\u00ednka, p\u0159esko\u010d\u00ed se dal\u0161\u00ed instrukce.
